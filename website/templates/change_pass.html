{% extends "base.html" %}
{% block title %}Change Password · 掼蛋{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="logo">
    <h1>掼蛋</h1>
    <p>Guandan · Online</p>
  </div>
  <h2>Change Password</h2>
  <form method="POST">
    <div class="form-group">
      <label for="password1">New Password</label>
      <input type="password" class="form-control" id="password1" name="password1" placeholder="At least 7 characters" required>
    </div>
    <div class="form-group">
      <label for="password2">Confirm New Password</label>
      <input type="password" class="form-control" id="password2" name="password2" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">Update Password</button>
  </form>
  <div class="auth-links">
    <a href="/">← Back to lobby</a>
  </div>
</div>
{% endblock %}
