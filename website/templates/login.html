{% extends "base.html" %}
{% block title %}Log In · 掼蛋{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="logo">
    <h1>掼蛋</h1>
    <p>Guandan · Online</p>
  </div>
  <h2>Welcome back</h2>
  <form method="POST">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" value="{{ request.form.get('email','') }}" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">Log In</button>
  </form>
  <div class="auth-links">
    <a href="/sign-up">No account? <span>Sign up free</span></a>
  </div>
</div>
{% endblock %}
